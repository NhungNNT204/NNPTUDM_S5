<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Posts Management</title>
</head>
<body>
    <h1>Posts</h1>
    <form onsubmit="event.preventDefault(); SaveData();">
        <input type="text" id="id" placeholder="ID (để trống để tự tăng)" />
        <input type="text" id="title" placeholder="Title" required />
        <input type="number" id="view" placeholder="Views" required />
        <input type="submit" value="Save" />
    </form>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Views</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="body">
        </tbody>
    </table>
    <script src="main.js"></script>
</body>
</html>
